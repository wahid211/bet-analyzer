            {error && (
              <div style={{
                background: "#ff4d6d22", border: "1px solid #ff4d6d44",
                borderRadius: 8, padding: "12px 16px", color: "#ff4d6d",
                fontSize: 12, marginBottom: 16
              }}>{error}</div>
            )}

            {/* CTA Button */}
            <button onClick={handleAnalyzeClick} disabled={loading} style={{
              width: "100%", padding: "16px",
              background: loading ? "#111" : "linear-gradient(135deg, #1a3a8f, #4d9eff)",
              border: loading ? "1px solid #1a1a2e" : "none",
              borderRadius: 10, color: loading ? "#444" : "#fff",
              fontSize: 13, fontWeight: 700, fontFamily: "'Space Mono', monospace",
              letterSpacing: 2, cursor: loading ? "default" : "pointer",
              textTransform: "uppercase", transition: "all 0.3s",
              boxShadow: loading ? "none" : "0 0 30px #4d9eff33"
            }}>
              {loading
                ? <span><span className="spin">⟳</span>  ANALYZING MATCH...</span>
                : "🧠  ANALYZE FOR GHS 10"}
            </button>

            {/* Results */}
            {result && (
              <div style={{ marginTop: 24 }} className="fade-in">

                {/* Verdict */}
                <div style={{
                  background: "linear-gradient(135deg, #0d0d1a, #0a1628)",
                  border: `1px solid ${verdictColor[result.verdict] || "#1a2a4a"}44`,
                  borderRadius: 12, padding: 22, marginBottom: 14
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
                    <div>
                      <div style={{ fontSize: 10, color: "#444", letterSpacing: 1.5, marginBottom: 4 }}>{form.league.toUpperCase()}</div>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 18, fontWeight: 900 }}>
                        {form.homeTeam} <span style={{ color: "#222" }}>vs</span> {form.awayTeam}
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 10, color: "#444", marginBottom: 4 }}>AI VERDICT</div>
                      <div style={{
                        fontFamily: "'Syne', sans-serif", fontSize: 18, fontWeight: 900,
                        color: verdictColor[result.verdict] || "#fff"
                      }}>{result.verdict?.replace(/_/g, " ")}</div>
                    </div>
                  </div>
                  <div style={{ marginTop: 16, padding: 14, background: "#07071180", borderRadius: 8, fontSize: 12, color: "#999", lineHeight: 1.8 }}>
                    {result.summary}
                  </div>
                  <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <Badge label={`Risk: ${result.riskLevel}`} color={riskColor[result.riskLevel] + "22"} textColor={riskColor[result.riskLevel]} />
                    <Badge label={`Stake: ${result.stakeAdvice}`} color="#ffd70022" textColor="#ffd700" />
                  </div>
                </div>

                {/* Key Factors */}
                {result.keyFactors?.length > 0 && (
                  <div style={card}>
                    <div style={sectionTitle("#ffd700")}>
                      <span style={{ width: 2, height: 14, background: "#ffd700", display: "inline-block", borderRadius: 2 }} />
                      Key Factors
                    </div>
                    {result.keyFactors.map((f, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, marginBottom: 8, fontSize: 12, color: "#bbb" }}>
                        <span style={{ color: "#ffd700" }}>→</span> {f}
                      </div>
                    ))}
                  </div>
                )}

                {/* Bet Cards */}
                {result.bets?.map((bet, i) => (
                  <div key={i} className="fade-in" style={{
                    background: "#0d0d1a",
                    border: `1px solid ${valueColor[bet.value]}33`,
                    borderRadius: 12, padding: 20, marginBottom: 12
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
                      <div>
                        <div style={{ fontSize: 10, color: "#444", letterSpacing: 1, marginBottom: 3 }}>{bet.type?.toUpperCase()}</div>
                        <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 17, fontWeight: 900, color: "#e0e0ff" }}>{bet.pick}</div>
                      </div>
                      <div style={{ display: "flex", gap: 6, alignItems: "flex-start" }}>
                        <Badge label={`${bet.value} VALUE`} color={valueColor[bet.value] + "22"} textColor={valueColor[bet.value]} />
                        {bet.odds && <Badge label={`Min ${bet.odds}`} color="#111" textColor="#555" />}
                      </div>
                    </div>
                    <div style={{ fontSize: 12, color: "#777", lineHeight: 1.8, marginBottom: 10 }}>{bet.reasoning}</div>
                    <ConfidenceMeter value={bet.confidence} />
                  </div>
                ))}

                {/* Powered by */}
                <div style={{ textAlign: "center", marginTop: 20, marginBottom: 8 }}>
                  <div style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    background: "#0d0d1a", border: "1px solid #1a1a2e",
                    borderRadius: 20, padding: "6px 14px"
                  }}>
                    <span style={{ fontSize: 12 }}>🧠</span>
                    <span style={{ fontSize: 10, color: "#333", letterSpacing: 1 }}>POWERED BY BETMIND AI</span>
                  </div>
                </div>
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 28, marginBottom: 16, fontSize: 10, color: "#222", lineHeight: 2 }}>
              FOR ANALYTICAL PURPOSES ONLY · BET RESPONSIBLY<br />
              © 2024 BETMIND AI · ALL RIGHTS RESERVED
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BetMindAI />);
  </script>

</body>
</html>
