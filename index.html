<script type="text/babel">
const { useState, useCallback } = React;

// ── CONFIG ──
const MOMO = “0542232899”;
const PRICE = 10;
const CODES = [“BM-4831”,“BM-7263”,“BM-9104”,“BM-3357”,“BM-6892”,“BM-2048”,“BM-5571”,“BM-8830”,“BM-1195”,“BM-4462”,“BM-7039”,“BM-2984”,“BM-6617”,“BM-3305”,“BM-9743”,“BM-1822”,“BM-5590”,“BM-8014”,“BM-3671”,“BM-7458”,“BETA-FREE”];
const LEAGUES = [“Premier League”,“La Liga”,“Serie A”,“Bundesliga”];
const BET_TYPES = [“1X2 (Match Result)”,“Over/Under Goals”,“BTTS”,“Asian Handicap”];

// ── RULE-BASED ANALYSIS ENGINE ──
function analyzeMatch(form) {
const { homeTeam, awayTeam, league, homeForm, awayForm, homePosition, awayPosition,
homeGoalsFor, homeGoalsAgainst, awayGoalsFor, awayGoalsAgainst, h2h, odds1, oddsX, odds2, betTypes, extraContext } = form;

// Parse form strings e.g. “W W D L W”
const parseForm = (f) => {
if (!f) return [];
return f.toUpperCase().replace(/[^WDL]/g, ’ ’).trim().split(/\s+/).filter(Boolean).slice(0, 5);
};
const formScore = (results) => {
return results.reduce((s, r) => s + (r === ‘W’ ? 3 : r === ‘D’ ? 1 : 0), 0);
};
const hForm = parseForm(homeForm);
const aForm = parseForm(awayForm);
const hScore = formScore(hForm);
const aScore = formScore(aForm);

const hPos = parseInt(homePosition) || 10;
const aPos = parseInt(awayPosition) || 10;
const hGF = parseFloat(homeGoalsFor) || 0;
const hGA = parseFloat(homeGoalsAgainst) || 0;
const aGF = parseFloat(awayGoalsFor) || 0;
const aGA = parseFloat(awayGoalsAgainst) || 0;
const o1 = parseFloat(odds1) || 2.5;
const oX = parseFloat(oddsX) || 3.2;
const o2 = parseFloat(odds2) || 2.8;

// Implied probabilities
const total = (1/o1) + (1/oX) + (1/o2);
const impHome = (1/o1) / total;
const impDraw = (1/oX) / total;
const impAway = (1/o2) / total;

// Strength scores
let homeStr = 50;
let awayStr = 50;

// Home advantage
homeStr += 5;

// Form
homeStr += (hScore - 7.5) * 2;
awayStr += (aScore - 7.5) * 2;

// Position
homeStr += (10 - hPos) * 1.5;
awayStr += (10 - aPos) * 1.5;

// Goals
if (hGF > 0) homeStr += (hGF / 10) * 5;
if (hGA > 0) homeStr -= (hGA / 10) * 5;
if (aGF > 0) awayStr += (aGF / 10) * 5;
if (aGA > 0) awayStr -= (aGA / 10) * 5;

homeStr = Math.max(20, Math.min(85, homeStr));
awayStr = Math.max(20, Math.min(85, awayStr));

// Win probabilities
const totalStr = homeStr + awayStr + 20;
const homeWinP = (homeStr / totalStr);
const awayWinP = (awayStr / totalStr);
const drawP = 1 - homeWinP - awayWinP;

// Verdict
let verdict, verdictColor, verdictBg;
if (homeWinP > 0.45) { verdict = “HOME WIN”; verdictColor = “#00e676”; verdictBg = “#00e67610”; }
else if (awayWinP > 0.45) { verdict = “AWAY WIN”; verdictColor = “#2979ff”; verdictBg = “#2979ff10”; }
else if (drawP > 0.3) { verdict = “DRAW LIKELY”; verdictColor = “#FFD600”; verdictBg = “#FFD60010”; }
else { verdict = “UNPREDICTABLE”; verdictColor = “#E8001D”; verdictBg = “#E8001D10”; }

const mainConf = Math.round(Math.max(homeWinP, awayWinP, drawP) * 100);

// Goals analysis
const avgGoals = ((hGF + hGA + aGF + aGA) / 2) || 2.5;
const over25P = avgGoals > 2.8 ? 0.72 : avgGoals > 2.3 ? 0.58 : 0.42;
const bttsP = (hGF > 10 && aGF > 10) ? 0.68 : (hGA > 15 || aGA > 15) ? 0.71 : 0.52;

// Value detection
const homeValue = homeWinP > impHome * 1.1;
const awayValue = awayWinP > impAway * 1.1;
const over25Value = over25P > 0.62;

// Build bets
const selectedTypes = betTypes.length ? betTypes : BET_TYPES;
const bets = [];

if (selectedTypes.includes(“1X2 (Match Result)”)) {
const pick = homeWinP > awayWinP ? `${homeTeam} Win` : `${awayTeam} Win`;
const conf = homeWinP > awayWinP ? Math.round(homeWinP * 100) : Math.round(awayWinP * 100);
const value = (homeWinP > awayWinP ? homeValue : awayValue) ? “HIGH” : conf > 55 ? “MEDIUM” : “LOW”;
const minOdds = homeWinP > awayWinP ? o1 : o2;
bets.push({
type: “1X2 Match Result”, pick, confidence: Math.max(45, Math.min(85, conf)),
odds: minOdds.toFixed(2), value,
reasoning: `${pick} backed by ${homeWinP > awayWinP ? homeTeam+"'s" : awayTeam+"'s"} form score of ${homeWinP > awayWinP ? hScore : aScore}/15 and league position advantage. ${value === "HIGH" ? "Market odds offer real value here." : "Confidence is moderate — use as part of accumulator."}`
});
}

if (selectedTypes.includes(“Over/Under Goals”)) {
const pick = over25P > 0.55 ? “Over 2.5 Goals” : “Under 2.5 Goals”;
const conf = Math.round(Math.abs(over25P - 0.5) * 200 + 50);
const value = over25Value ? “HIGH” : conf > 58 ? “MEDIUM” : “LOW”;
bets.push({
type: “Over/Under Goals”, pick, confidence: Math.max(45, Math.min(82, conf)),
odds: pick.includes(“Over”) ? “1.75” : “2.00”, value,
reasoning: `Average goals across both teams' recent matches suggests ${avgGoals.toFixed(1)} per game. ${pick.includes("Over") ? "High scoring tendencies on both sides." : "Defensive records indicate a tight match."} ${hGA > 15 || aGA > 15 ? "Leaky defences increase goal probability." : ""}`
});
}

if (selectedTypes.includes(“BTTS”)) {
const pick = bttsP > 0.55 ? “BTTS Yes” : “BTTS No”;
const conf = Math.round(Math.abs(bttsP - 0.5) * 200 + 50);
const value = bttsP > 0.62 ? “HIGH” : conf > 58 ? “MEDIUM” : “LOW”;
bets.push({
type: “Both Teams To Score”, pick, confidence: Math.max(45, Math.min(80, conf)),
odds: pick.includes(“Yes”) ? “1.80” : “2.10”, value,
reasoning: `${pick === "BTTS Yes" ? `Both sides have shown attacking intent. ${homeTeam} GF: ${hGF}, ${awayTeam} GF: ${aGF}.`:`At least one side is likely to be shut out based on defensive form.`} ${bttsP > 0.65 ? "Strong BTTS signal detected." : "Moderate probability — pair with other selections."}`
});
}

if (selectedTypes.includes(“Asian Handicap”)) {
const stronger = homeStr > awayStr ? homeTeam : awayTeam;
const handicap = Math.abs(homeStr - awayStr) > 15 ? “-1” : “-0.5”;
const pick = `${stronger} ${handicap}`;
const conf = Math.round(Math.abs(homeStr - awayStr));
bets.push({
type: “Asian Handicap”, pick, confidence: Math.max(48, Math.min(78, conf + 45)),
odds: “1.90”, value: conf > 15 ? “MEDIUM” : “LOW”,
reasoning: `${stronger} shows a clear strength advantage (${Math.round(Math.max(homeStr,awayStr))} vs ${Math.round(Math.min(homeStr,awayStr))}). Handicap cushion reduces risk. ${conf > 20 ? "Gap is significant enough to back." : "Close contest — use small stake."}`
});
}

// Key factors
const factors = [];
if (hScore > aScore) factors.push(`${homeTeam} in better form (${hScore}/15 pts)`);
else if (aScore > hScore) factors.push(`${awayTeam} in better form (${aScore}/15 pts)`);
else factors.push(“Both teams evenly matched on form”);
if (hPos < aPos) factors.push(`${homeTeam} higher in table (${hPos}${hPos===1?"st":hPos===2?"nd":hPos===3?"rd":"th"} vs ${aPos}${aPos===1?"st":aPos===2?"nd":aPos===3?"rd":"th"})`);
else factors.push(`${awayTeam} better league position (${aPos}${aPos===1?"st":aPos===2?"nd":aPos===3?"rd":"th"})`);
if (over25P > 0.6) factors.push(“High goal expectancy — both attacks in form”);
else factors.push(“Likely tight, low-scoring affair”);
if (h2h) factors.push(“H2H history factored into assessment”);

const risk = mainConf > 70 ? “LOW” : mainConf > 58 ? “MEDIUM” : “HIGH”;

return {
verdict, verdictColor, verdictBg,
confidence: mainConf,
summary: `${homeTeam} host ${awayTeam} in a ${league} clash. ${homeStr > awayStr ? homeTeam + " hold the edge" : awayTeam + " look stronger"} based on current form and standings. ${over25P > 0.6 ? "An open, goal-heavy game is expected." : "Expect a competitive, tight affair."}`,
bets, factors, risk,
stakeAdvice: mainConf > 70 ? “2–3 units” : mainConf > 58 ? “1–2 units” : “0.5–1 unit”
};
}

setError(””); setShowPaywall(true);

setShowPaywall(false);
setLoading(true);
setResult(null);
setAddedBets({});
setTimeout(() => {
const r = analyzeMatch(form);

setLoading(false);
}, 1200);
};

const addToSlip = (bet, idx) => {

setSlip(s => […s, item]);
setAddedBets(a => ({…a, [idx]: true}));
};

const confColor = c => c >= 70 ? “var(–green)” : c >= 55 ? “var(–yellow)” : “var(–red)”;
const valClass = v => v===“HIGH” ? “badge-high” : v===“MEDIUM” ? “badge-med” : “badge-low”;
